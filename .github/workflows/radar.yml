name: RADAR IA

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install rss-parser

      - name: Generate radar
        run: node generate_radar.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          API_KEY: ${{ secrets.API_KEY }}
          OPENAI_TOKEN: ${{ secrets.OPENAI_TOKEN }}

      - name: Commit radar files
        run: |
          git config user.name "radar-bot"
          git config user.email "actions@github.com"
          git add daily.json history.json
          git diff --cached --quiet || git commit -m "update radar"
          git push
      - name: Send Telegram briefing
        run: |
          MESSAGE=$(node -e "
          const fs=require('fs');
          const data=JSON.parse(fs.readFileSync('daily.json','utf8'));
      
          const date=new Date().toISOString().slice(0,10);
      
          let text='🧠 Radar IA — '+date+'\\n\\n';
          text+='Se detectaron '+data.items.length+' señales relevantes.\\n\\n';
      
          data.items.slice(0,5).forEach(i=>{
            text+='• '+i.title+'\\n';
            text+='Impacto: '+(i.why_it_matters || i.summary)+'\\n\\n';
          });
      
          text+='🌐 Radar completo:\\n';
          text+='https://'+process.env.GITHUB_REPOSITORY_OWNER+'.github.io/'+process.env.GITHUB_REPOSITORY.split('/')[1];
      
          console.log(text);
          ")
      
          RESPONSE=$(curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode text="$MESSAGE")
      
          echo "$RESPONSE"HAT_ID }} \
                -d text="$MESSAGE" \
