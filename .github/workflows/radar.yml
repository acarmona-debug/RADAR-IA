name: Radar IA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write

jobs:
  generate-radar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install OpenAI
        run: npm install openai --no-save

      - name: Run radar generator
        run: node generate_radar.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit results
        run: |
          rm -rf node_modules package-lock.json
          git config --global user.name "radar-bot"
          git config --global user.email "bot@radar.ai"
          git add daily.json
          git diff --cached --quiet || git commit -m "update radar"
          git push
