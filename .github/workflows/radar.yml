name: Radar IA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  generate-radar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install openai

      - run: node generate_radar.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - run: |
          git config --global user.name "radar-bot"
          git config --global user.email "bot@radar.ai"
          git add daily.json
          git commit -m "update radar" || echo "no changes"
          git push
