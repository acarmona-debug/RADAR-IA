name: Radar IA

on:
  schedule:
    - cron: '0 14 * * *'   # 8:00 AM Mexico aprox
  workflow_dispatch:

jobs:
  generate-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAI SDK
        run: npm install openai

      - name: Run radar generator
        run: node generate_radar.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit results
        run: |
          git config --global user.name "radar-bot"
          git config --global user.email "bot@radar.ai"
          git add daily.json
          git commit -m "update radar" || echo "no changes"
          git push
